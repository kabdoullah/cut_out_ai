name: Build Android

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        type: choice
        default: 'appbundle'
        options:
          - 'apk'
          - 'appbundle'
          - 'both'

jobs:
  build:
    name: Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF

      - name: Update build.gradle.kts for CI keystore path
        run: |
          sed -i 's|storeFile = keystoreProperties\["storeFile"\]?.let { rootProject.file(it) }|storeFile = file("release-keystore.jks")|g' android/app/build.gradle.kts

      - name: Build App Bundle
        if: github.event.inputs.build_type == 'appbundle' || github.event.inputs.build_type == 'both' || github.event.inputs.build_type == ''
        env:
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}
        run: flutter build appbundle --release --dart-define=REMOVEBG_API_KEY=$REMOVEBG_API_KEY

      - name: Build APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both'
        env:
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}
        run: flutter build apk --release --dart-define=REMOVEBG_API_KEY=$REMOVEBG_API_KEY

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | cut -d '+' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION+$BUILD_NUMBER"

      - name: Rename artifacts
        run: |
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            cp build/app/outputs/bundle/release/app-release.aab \
               build/app/outputs/bundle/release/cutout-ai-${{ steps.version.outputs.version }}.aab
          fi
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk \
               build/app/outputs/flutter-apk/cutout-ai-${{ steps.version.outputs.version }}.apk
          fi

      - name: Upload App Bundle
        if: github.event.inputs.build_type == 'appbundle' || github.event.inputs.build_type == 'both' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-release
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/app/release-keystore.jks
          rm -f android/key.properties

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/bundle/release/cutout-ai-${{ steps.version.outputs.version }}.aab
            build/app/outputs/flutter-apk/cutout-ai-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ steps.version.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            AAB_SIZE=$(du -h build/app/outputs/bundle/release/app-release.aab | cut -f1)
            echo "**App Bundle Size:** $AAB_SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
            echo "**APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          fi
