<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>CutOut AI — Feature Graphic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .container {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* Orbes décoratifs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #7c3aed, transparent);
    top: -100px; left: -80px;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #2563eb, transparent);
    bottom: -80px; right: 200px;
  }
  .orb-3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, #7c3aed 0%, #db2777 100%);
    top: 50px; right: 80px;
    opacity: 0.25;
  }

  /* Grille de points */
  .dots-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Panneau gauche — texte */
  .left-panel {
    position: relative;
    z-index: 10;
    padding: 60px 0 60px 72px;
    flex: 1;
    max-width: 560px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124, 58, 237, 0.25);
    border: 1px solid rgba(124, 58, 237, 0.5);
    border-radius: 100px;
    padding: 6px 14px;
    margin-bottom: 24px;
  }
  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #a78bfa;
    box-shadow: 0 0 8px #a78bfa;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .badge span {
    font-size: 12px;
    font-weight: 600;
    color: #c4b5fd;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .app-name {
    font-size: 62px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 60%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .tagline {
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    line-height: 1.55;
    max-width: 380px;
    margin-bottom: 36px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .feature-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .feature-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .fi-1 { background: rgba(124,58,237,0.3); }
  .fi-2 { background: rgba(37,99,235,0.3); }
  .fi-3 { background: rgba(16,185,129,0.3); }
  .feature-text {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  /* Panneau droit — illustration */
  .right-panel {
    position: relative;
    z-index: 10;
    width: 380px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Mockup de téléphone */
  .phone {
    position: relative;
    width: 180px;
    height: 360px;
    background: linear-gradient(160deg, #1e1b4b, #312e81);
    border-radius: 32px;
    border: 2px solid rgba(255,255,255,0.12);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
  }

  /* Notch */
  .phone::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 20px;
    background: #0f0c29;
    border-radius: 0 0 16px 16px;
    z-index: 5;
  }

  .phone-screen {
    position: absolute;
    inset: 6px;
    border-radius: 26px;
    background: linear-gradient(160deg, #1e1b4b 0%, #0f0c29 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    overflow: hidden;
  }

  /* Simulation d'image avec détourage */
  .image-before-after {
    width: 120px;
    height: 130px;
    position: relative;
  }

  /* Silhouette d'une personne stylisée */
  .person-shape {
    width: 70px;
    height: 110px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
  }

  /* Tête */
  .person-head {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fbbf24, #f97316);
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 12px rgba(251,191,36,0.4);
  }

  /* Corps */
  .person-body {
    width: 42px; height: 55px;
    background: linear-gradient(160deg, #7c3aed, #4f46e5);
    border-radius: 20px 20px 8px 8px;
    position: absolute;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 16px rgba(124,58,237,0.5);
  }

  /* Jambes */
  .person-legs {
    width: 42px; height: 28px;
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .leg {
    flex: 1;
    background: linear-gradient(180deg, #4f46e5, #3730a3);
    border-radius: 4px 4px 8px 8px;
  }

  /* Checkered background (transparence) */
  .checkerboard {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background-image:
      linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.04) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.04) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.04) 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
  }

  /* Lignes de scan IA */
  .scan-line {
    position: absolute;
    left: 10px; right: 10px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #7c3aed, #818cf8, #7c3aed, transparent);
    border-radius: 2px;
    opacity: 0.8;
    animation: scan 2.5s ease-in-out infinite;
  }
  @keyframes scan {
    0% { top: 10px; opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { top: 120px; opacity: 0; }
  }

  /* Particules d'étoiles */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: #a78bfa;
    border-radius: 50%;
    box-shadow: 0 0 6px #a78bfa;
  }
  .s1 { top: 20px; right: 20px; animation: twinkle 1.8s ease-in-out infinite; }
  .s2 { top: 60px; right: 10px; width: 4px; height: 4px; animation: twinkle 2.2s ease-in-out infinite 0.5s; }
  .s3 { bottom: 40px; right: 25px; width: 4px; height: 4px; animation: twinkle 1.5s ease-in-out infinite 1s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Label IA */
  .ai-label {
    background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(79,70,229,0.4));
    border: 1px solid rgba(124,58,237,0.6);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    color: #c4b5fd;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Flèche décorative */
  .arrow-decoration {
    position: absolute;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.6));
    right: 380px;
    top: 50%;
    transform: translateY(-50%);
  }
  .arrow-decoration::after {
    content: '';
    position: absolute;
    right: 0; top: -3px;
    width: 8px; height: 8px;
    border-top: 2px solid rgba(124,58,237,0.6);
    border-right: 2px solid rgba(124,58,237,0.6);
    transform: rotate(45deg);
  }

  /* Cercle glow autour du téléphone */
  .phone-glow {
    position: absolute;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Éléments flottants */
  .float-tag {
    position: absolute;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }
  .float-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .tag-1 { top: 80px; right: 20px; }
  .tag-2 { bottom: 95px; right: 14px; }

</style>
</head>
<body>
<div class="container">
  <!-- Fond -->
  <div class="dots-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Texte gauche -->
  <div class="left-panel">
    <div class="badge">
      <div class="badge-dot"></div>
      <span>Propulsé par l'IA</span>
    </div>

    <div class="app-name">CutOut AI</div>

    <p class="tagline">
      Supprimez l'arrière-plan de vos photos en un clic grâce à l'intelligence artificielle.
    </p>

    <div class="features">
      <div class="feature-item">
        <div class="feature-icon fi-1">✂️</div>
        <span class="feature-text">Détourage automatique par IA</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon fi-2">📷</div>
        <span class="feature-text">Galerie ou appareil photo</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon fi-3">💾</div>
        <span class="feature-text">Export PNG transparent</span>
      </div>
    </div>
  </div>

  <!-- Illustration droite -->
  <div class="right-panel">
    <div class="phone-glow"></div>

    <div class="phone">
      <div class="phone-screen">
        <div class="image-before-after">
          <div class="checkerboard"></div>
          <div class="scan-line"></div>
          <div class="person-shape">
            <div class="person-head"></div>
            <div class="person-body"></div>
            <div class="person-legs">
              <div class="leg"></div>
              <div class="leg"></div>
            </div>
          </div>
        </div>
        <div class="ai-label">✨ Arrière-plan supprimé</div>

        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
      </div>
    </div>

    <!-- Tags flottants -->
    <div class="float-tag tag-1">
      <div class="float-dot" style="background:#10b981;box-shadow:0 0 6px #10b981;"></div>
      Résultat instantané
    </div>
    <div class="float-tag tag-2">
      <div class="float-dot" style="background:#a78bfa;box-shadow:0 0 6px #a78bfa;"></div>
      100% automatique
    </div>
  </div>
</div>
</body>
</html>
